name: IndexNow

on:
  workflow_call:
    inputs:
      mode:
        description: 'Submission mode: changed or all'
        required: false
        default: 'changed'
        type: string
      branch:
        description: 'Branch to inspect for diffs'
        required: false
        default: 'main'
        type: string
      head-sha:
        description: 'Commit SHA to submit from'
        required: false
        type: string
      site-url:
        description: 'Canonical site URL used for sitemap discovery'
        required: false
        default: 'https://th3s4mur41.me'
        type: string
    secrets:
      INDEXNOW_KEY:
        required: false

  workflow_dispatch:
    inputs:
      mode:
        description: 'Submission mode'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - changed

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}_${{ inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  submit:
    name: '🔎 Submit to IndexNow'
    runs-on: ubuntu-latest
    env:
      INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

    steps:
      - name: '⏭️ Skip when IndexNow key is unavailable'
        if: env.INDEXNOW_KEY == ''
        run: echo 'INDEXNOW_KEY is not configured; skipping IndexNow submission.'

      - name: '☁️ Checkout repository'
        if: env.INDEXNOW_KEY != ''
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.head-sha || inputs.branch || github.ref_name }}
          fetch-depth: 0

      - name: '⚙️ Use Node.js'
        if: env.INDEXNOW_KEY != ''
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          check-latest: true

      - name: '🧮 Determine target commit'
        if: env.INDEXNOW_KEY != ''
        id: target
        run: |
          head_sha='${{ inputs.head-sha }}'
          if [ -z "$head_sha" ]; then
            head_sha="$(git rev-parse HEAD)"
          fi

          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "branch=${{ inputs.branch || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "mode=${{ inputs.mode || 'changed' }}" >> "$GITHUB_OUTPUT"
          echo "site_url=${{ inputs.site-url || 'https://th3s4mur41.me' }}" >> "$GITHUB_OUTPUT"

      - name: '🔍 Find previous successful IndexNow run'
        if: env.INDEXNOW_KEY != '' && steps.target.outputs.mode == 'changed'
        id: previous
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          previous_sha="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/indexnow.yml/runs?branch=${{ steps.target.outputs.branch }}&status=success&per_page=1" --jq '.workflow_runs[0].head_sha // ""')"
          echo "previous_sha=$previous_sha" >> "$GITHUB_OUTPUT"

      - name: '🗺️ Resolve URLs to notify'
        if: env.INDEXNOW_KEY != ''
        id: urls
        env:
          MODE: ${{ steps.target.outputs.mode }}
          SITE_URL: ${{ steps.target.outputs.site_url }}
          CURRENT_SHA: ${{ steps.target.outputs.head_sha }}
          PREVIOUS_SHA: ${{ steps.previous.outputs.previous_sha }}
          OUTPUT_PATH: indexnow-urls.txt
        run: |
          node .github/scripts/resolve-indexnow-urls.mjs
          count=$(grep -c '.' indexnow-urls.txt 2>/dev/null || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: '📤 Submit URLs to IndexNow'
        if: env.INDEXNOW_KEY != '' && steps.urls.outputs.count != '0'
        env:
          SITE_URL: ${{ steps.target.outputs.site_url }}
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from 'node:fs';

          const siteUrl = (process.env.SITE_URL || 'https://th3s4mur41.me').replace(/\/$/, '');
          const host = new URL(siteUrl).host;
          const key = process.env.INDEXNOW_KEY;
          const urls = readFileSync('indexnow-urls.txt', 'utf8').split(/\r?\n/).filter(Boolean);

          for (let index = 0; index < urls.length; index += 10000) {
            const batch = urls.slice(index, index + 10000);
            const response = await fetch('https://api.indexnow.org/indexnow', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ host, key, urlList: batch }),
            });

            const responseText = await response.text();
            if (!response.ok) {
              console.error(responseText);
              throw new Error(`IndexNow submission failed with ${response.status}`);
            }

            console.log(`Submitted ${batch.length} URL(s) to IndexNow.`);
            if (responseText) console.log(responseText);
          }
          EOF

      - name: 'ℹ️ No URLs to submit'
        if: env.INDEXNOW_KEY != '' && steps.urls.outputs.count == '0'
        run: echo 'No relevant URLs changed; skipping IndexNow submission.'