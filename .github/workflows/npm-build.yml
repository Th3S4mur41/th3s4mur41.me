# This is the workflow to build and test the code
name: Build & Test

# Controls when the action will run.
on:
  # Allows you to call this workflow from other workflows
  workflow_call:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: '🛠️ Build & Test'
    runs-on: ubuntu-latest

    steps:
      - name: '☁️ Checkout repository'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0 # Fetches all history so timestamps are more consistent for image optimization caching

      - name: '⚙️ Use Node.js'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          check-latest: true
          cache: 'npm'

      - name: '⛓️ Install dependencies'
        env:
          HUSKY: 0
        run: npm ci --no-audit --prefer-offline --progress=false

      - name: '💾 Cache Astro image optimization'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .astro
            node_modules/.astro
          key: astro-cache-${{ runner.os }}-${{ github.ref_name }}-v1
          restore-keys: |
            astro-cache-${{ runner.os }}-${{ github.ref_name }}-v1
            astro-cache-${{ runner.os }}-main-v1
            astro-cache-${{ runner.os }}-

      - name: '✅ Lint code'
        run: npm run lint -- --reporter=github

      - name: '🛠️ Build'
        env:
          PREVIEW_FUTURE_CONTENT: ${{ github.event_name == 'pull_request' && 'true' || '' }}
        run: npm run build --if-present

      - name: '🧫 Run tests'
        run: npm run test --if-present

      - name: '📎 Upload build output'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: |
            dist/
            package.json
            package-lock.json
          retention-days: 1
