# This is the workflow to lint the source code
name: Publish

# Controls when the action will run.
on:
  # Allows you to call this workflow from other workflows
  workflow_call:
    secrets:
      CLOUDFLARE_ID:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      INDEXNOW_KEY:
        required: false
    inputs:
      CLOUDFLARE_PROJECT_NAME:
        description: 'The Cloudflare Pages project name'
        required: true
        type: string
    outputs:
      deployment-url:
        description: 'The URL of the deployed site'
        value: ${{ jobs.build.outputs.deployment-url }}

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:


    
jobs:
  build:
    name: '🚀 Publish'
    runs-on: ubuntu-latest

    outputs:
      deployment-url: ${{ steps.cloudflare-deploy.outputs.deployment-url }}

    permissions:
      contents: read
      actions: read
      deployments: write

    steps:
      # Do not checkout PR code in this privileged workflow (secrets are available
      # here). We deploy the trusted build artifact and pass commit metadata
      # explicitly so Cloudflare can still associate preview deployments with PRs.

      - name: '📎 Download build output'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create IndexNow key file
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo 'INDEXNOW_KEY is empty; skipping key file creation.'
            exit 0
          fi

          # Validate the key before using it as part of a filename to prevent
          # path traversal or unexpected failures from slashes, dots, or whitespace.
          if [[ ! "$INDEXNOW_KEY" =~ ^[A-Za-z0-9_-]+$ ]]; then
            echo 'INDEXNOW_KEY contains characters that are unsafe for filenames; expected only letters, numbers, underscores, or hyphens.'
            exit 1
          fi

          printf '%s' "$INDEXNOW_KEY" > "dist/${INDEXNOW_KEY}.txt"
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: '🚀 Publish to Cloudflare Pages'
        id: cloudflare-deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        env:
          GITHUB_HEAD_REF: ${{ github.event.workflow_run.head_branch || github.head_ref }}
          GITHUB_REF_NAME: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ID }}
          command: pages deploy ./dist --project-name=${{ inputs.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.event.workflow_run.head_branch || github.head_ref }} --commit-hash=${{ github.event.workflow_run.head_sha || github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: '📝 Save deployment URL'
        run: |
          echo "Deployed to: ${{ steps.cloudflare-deploy.outputs.deployment-url }}"
          echo "Alias URL: ${{ steps.cloudflare-deploy.outputs.pages-deployment-alias-url }}"

